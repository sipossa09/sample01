<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고수의홈페이지 따라만들기</title>
    <link rel="stylesheet" href="./css/reset.css">
    <script src="./js/jquery-1.12.4.js"></script>
</head>

<body>
    <div class="wrap">
        <div class="slide">
            <div class="slide_wrap">
                <div class="itm itm1">
                    <h3>Lorem ipsum dolor sit.</h3>
                </div>
                <div class="itm itm2">
                    <h3>Lorem ipsum dolor sit.</h3>
                </div>
                <div class="itm itm3">
                    <h3>Lorem ipsum dolor sit.</h3>
                </div>
            </div>

        </div>

    </div>


    <style>
        .slide {
            width: 1200px;
            overflow: hidden;
        }

        .slide_wrap {
            display: flex;
            width: 3600px;

        }

        .slide_wrap .itm {
            width: 1200px;
            height: 400px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

    <script>
        $(function () {
            var num = 0;
            function slide() {
                num++;
                if (num > 2) {
                    num = 0;
                }

                $(".slide_wrap").animate({
                    marginLeft: -1200 * num
                }, 500);
            }

            setInterval(slide, 3000);

        });

    </script>
</body>

</html>
